# Research stack ONLY — scorer + template evolution + heartbeat.
# Never run the trader (__main__.py) on this machine.
#
# Quick start (repo root):
#   docker network create postgres_default
#   docker compose -f infra/postgres/docker-compose.yml --env-file infra/postgres/.env up -d
#   docker compose -f infra/runtime/docker-compose.research.yml --env-file .env up -d --build
#
# Two-host prod: add -f infra/runtime/examples/docker-compose.prod.research.yml
# Single-machine dev: add -f infra/runtime/examples/docker-compose.dev.yml
#
# Logs: docker logs -f abc-research-host
# Health: docker inspect --format='{{.State.Health.Status}}' abc-research-host

networks:
  postgres_default:
    external: true

services:
  abc-research:
    build:
      context: ../..
      dockerfile: infra/runtime/Dockerfile.research
    image: abc-research:latest
    container_name: abc-research-host
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      ABC_RESEARCH_HOST: "1"
      IBKR_QUOTES_ENABLED: "0"
      DOCKER_HEALTHCHECK_MDA: ${DOCKER_HEALTHCHECK_MDA:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - postgres_default
    healthcheck:
      test: ["CMD", "python", "scripts/docker_healthcheck.py", "research"]
      interval: 60s
      timeout: 25s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
