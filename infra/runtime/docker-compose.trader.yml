# Trader stack — Grok agent + IBKR. Do not colocate with research in production.
#
# Quick start (repo root, TWS/Gateway on host):
#   docker network create postgres_default
#   docker compose -f infra/runtime/docker-compose.trader.yml --env-file .env up -d --build
#
# Two-host prod: add -f infra/runtime/examples/docker-compose.prod.trader.yml
# Single-machine dev: add -f infra/runtime/examples/docker-compose.dev.yml
#
# Logs: docker logs -f abc-trader
# Health: docker inspect --format='{{.State.Health.Status}}' abc-trader
# Status API (optional): docker compose -f infra/runtime/docker-compose.status.yml up -d

networks:
  postgres_default:
    external: true

services:
  abc-trader:
    build:
      context: ../..
      dockerfile: infra/runtime/Dockerfile.trader
    image: ${ABC_TRADER_IMAGE:-abc-trader:latest}
    container_name: abc-trader
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      IBKR_HOST: ${IBKR_HOST:-host.docker.internal}
      TRADER_IN_PROCESS_SCORER: ${TRADER_IN_PROCESS_SCORER:-never}
      DOCKER_HEALTHCHECK_REQUIRE_RESEARCH: ${DOCKER_HEALTHCHECK_REQUIRE_RESEARCH:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - postgres_default
    healthcheck:
      test: ["CMD", "python", "scripts/docker_healthcheck.py", "trader"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
